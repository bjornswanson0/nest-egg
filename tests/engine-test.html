<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nest Egg engine tests</title>
</head>
<body>
<pre id="out"></pre>
<script src="../js/engine.js"></script>
<script>
(function () {
  'use strict';
  var out = [];
  function t(name, cond, detail) {
    out.push((cond ? 'PASS' : 'FAIL') + ' | ' + name + (cond ? '' : ' | got: ' + detail));
  }
  function near(a, b, tol) { return Math.abs(a - b) <= tol; }

  var blank = {
    profile: { currentAge: 30, retirementAge: 40, annualIncome: 0, incomeGrowthPct: 0 },
    k401: { balance: 0, contribPct: 0, matchRatePct: 0, matchCapPct: 0, returnPct: 0 },
    roth: { balance: 0, monthly: 0, returnPct: 0 },
    hsa: { eligible: false, balance: 0, monthly: 0, returnPct: 0 },
    hysa: { balance: 0, apyPct: 0, monthly: 0, efTarget: 0 },
    debts: [],
    extraDebtMonthly: 0,
    goals: { retireSpendMonthly: 0, swrPct: 4, inflationPct: 0 },
    limits: { k401: 24500, ira: 7500, hsa: 4400, highAprPct: 7 }
  };
  function clone(o) { return JSON.parse(JSON.stringify(o)); }

  /* 1. Compound growth: $10k at 12% for 10y, no contributions -> 10000 * 1.12^10 */
  var c1 = clone(blank);
  c1.roth.balance = 10000; c1.roth.returnPct = 12;
  var r1 = NestEgg.simulate(NestEgg.normalize(c1), 'current');
  t('compound growth 10k @12% 10y = 31058.48',
    near(r1.final.roth, 31058.48, 0.5), r1.final.roth.toFixed(2));

  /* 2. Debt amortization: $5k @24% APR, $250/mo minimum -> 26 months, ~$1449.33 interest */
  var c2 = clone(blank);
  c2.debts = [{ name: 'card', balance: 5000, aprPct: 24, minPayment: 250 }];
  var r2 = NestEgg.simulate(NestEgg.normalize(c2), 'current');
  t('debt payoff month = 26', r2.debtFreeMonth === 26, r2.debtFreeMonth);
  t('debt total interest ~ 1449.33', near(r2.totalInterest, 1449.33, 1), r2.totalInterest.toFixed(2));

  /* 3. Employer match: $120k salary, 6% contrib, 50% match up to 6% -> $600 + $300 month 1 */
  var c3 = clone(blank);
  c3.profile.annualIncome = 120000;
  c3.k401.contribPct = 6; c3.k401.matchRatePct = 50; c3.k401.matchCapPct = 6;
  var r3 = NestEgg.simulate(NestEgg.normalize(c3), 'current');
  t('month-1 401k contribution = 600', near(r3.firstAlloc.k401, 600, 0.01), r3.firstAlloc.k401);
  t('month-1 employer match = 300', near(r3.firstAlloc.match, 300, 0.01), r3.firstAlloc.match);

  /* 4. Annual 401k limit: 30% of $120k caps at $24,500; per-paycheck match dies when
        contributions stop (8 months x 300 + 250 partial) -> balance 27150 at 0% return */
  var c4 = clone(blank);
  c4.profile.retirementAge = 31;
  c4.profile.annualIncome = 120000;
  c4.k401.contribPct = 30; c4.k401.matchRatePct = 50; c4.k401.matchCapPct = 6;
  var r4 = NestEgg.simulate(NestEgg.normalize(c4), 'current');
  t('401k limit caps year-1 balance at 27150', near(r4.final.k401, 27150, 1), r4.final.k401.toFixed(2));

  /* 5. Recommended allocator order: match first, then high-APR debt */
  var c5 = clone(blank);
  c5.profile.annualIncome = 60000;
  c5.k401.matchRatePct = 100; c5.k401.matchCapPct = 3;
  c5.hysa.monthly = 500;
  c5.debts = [{ name: 'card', balance: 4000, aprPct: 24, minPayment: 100 }];
  var r5 = NestEgg.simulate(NestEgg.normalize(c5), 'recommended');
  t('rec step 1: 401k to match = 150', near(r5.firstAlloc.steps.match, 150, 0.01), r5.firstAlloc.steps.match);
  t('rec step 2: rest to high-APR debt = 350', near(r5.firstAlloc.steps.hiDebt, 350, 0.01), r5.firstAlloc.steps.hiDebt);
  t('rec plan pays debt sooner than current',
    r5.debtFreeMonth < NestEgg.simulate(NestEgg.normalize(c5), 'current').debtFreeMonth,
    r5.debtFreeMonth);

  /* 6. Waterfall continues after debt + EF: budget flows into HSA then Roth */
  var c6 = clone(blank);
  c6.profile.annualIncome = 60000;
  c6.hsa.eligible = true;
  c6.hysa.monthly = 1000; c6.hysa.efTarget = 0;
  var r6 = NestEgg.simulate(NestEgg.normalize(c6), 'recommended');
  t('rec: no match/debt/EF -> HSA takes whole 1000 budget (annual room 4400)',
    near(r6.firstAlloc.steps.hsa, 1000, 0.01), r6.firstAlloc.steps.hsa);
  t('rec: month-1 budget fully allocated across hsa/roth/overflow',
    near(r6.firstAlloc.steps.hsa + r6.firstAlloc.steps.roth + r6.firstAlloc.steps.overflow, 1000, 0.01),
    JSON.stringify(r6.firstAlloc.steps));

  /* 7. Readiness target: $4k/mo spend today, 0% inflation, 4% SWR -> $1.2M */
  var c7 = clone(blank);
  c7.goals.retireSpendMonthly = 4000;
  var a7 = NestEgg.analyze(c7);
  t('nest-egg target = 1.2M', near(a7.target, 1200000, 0.01), a7.target);

  /* 8. Budget parity: both strategies spend the same total in month 1 */
  var c8 = clone(blank);
  c8.profile.annualIncome = 90000;
  c8.k401.contribPct = 5; c8.k401.matchRatePct = 100; c8.k401.matchCapPct = 4;
  c8.roth.monthly = 200; c8.hysa.monthly = 300; c8.extraDebtMonthly = 100;
  c8.brokerage = { balance: 0, monthly: 150, returnPct: 7 };
  c8.debts = [{ name: 'loan', balance: 8000, aprPct: 11, minPayment: 150 }];
  var cur8 = NestEgg.simulate(NestEgg.normalize(c8), 'current');
  var rec8 = NestEgg.simulate(NestEgg.normalize(c8), 'recommended');
  var spend = function (fa) { return fa.k401 + fa.roth + fa.hsa + fa.hysa + fa.brok + fa.debtExtra; };
  t('month-1 budgets match across strategies',
    near(spend(cur8.firstAlloc), spend(rec8.firstAlloc), 0.01),
    spend(cur8.firstAlloc) + ' vs ' + spend(rec8.firstAlloc));

  /* 8a. Known surplus: recommended deploys the full budget, current plan doesn't */
  var c8a = clone(blank);
  c8a.profile.annualIncome = 60000;
  c8a.profile.takeHomeMonthly = 4000;
  c8a.budget = { essentialsMonthly: 2000, lifestyleMonthly: 500 };
  c8a.roth.monthly = 300;
  var cur8a = NestEgg.simulate(NestEgg.normalize(c8a), 'current');
  var rec8a = NestEgg.simulate(NestEgg.normalize(c8a), 'recommended');
  t('surplus: current plan still spends its 300', near(spend(cur8a.firstAlloc), 300, 0.01), spend(cur8a.firstAlloc));
  t('surplus: recommended deploys the full 1500', near(spend(rec8a.firstAlloc), 1500, 0.01), spend(rec8a.firstAlloc));
  var bf8a = NestEgg.budgetFacts(NestEgg.normalize(c8a));
  t('budgetFacts: 1200/mo unallocated', near(bf8a.unallocated, 1200, 0.01), bf8a.unallocated);

  /* 8b. Overflow past every limit lands in the taxable brokerage */
  var c8b = clone(blank);
  c8b.profile.annualIncome = 60000;
  c8b.brokerage = { balance: 0, monthly: 1000, returnPct: 7 };
  c8b.limits = { k401: 300, ira: 300, hsa: 4400, highAprPct: 7 };
  var r8b = NestEgg.simulate(NestEgg.normalize(c8b), 'recommended');
  t('rec: roth takes 300 (tiny limit)', near(r8b.firstAlloc.steps.roth, 300, 0.01), r8b.firstAlloc.steps.roth);
  t('rec: 401k takes 300 (tiny limit)', near(r8b.firstAlloc.steps.k401Max, 300, 0.01), r8b.firstAlloc.steps.k401Max);
  t('rec: 400 overflow lands in brokerage', near(r8b.firstAlloc.brok, 400, 0.01), r8b.firstAlloc.brok);

  /* 9. Zero/blank inputs do not blow up */
  var a9 = NestEgg.analyze({});
  t('blank analyze returns without NaN', isFinite(a9.current.final.netWorth), a9.current.final.netWorth);

  /* 10. Tax haircut: pre-tax 401k dollars are worth (1 - rate) after tax */
  var c10 = clone(blank);
  c10.k401.balance = 100000;
  c10.goals.taxRatePct = 20;
  var a10 = NestEgg.analyze(c10);
  t('pre-tax 100k at 20% rate -> 80k spendable', near(a10.spendable, 80000, 0.5), a10.spendable);

  /* 11. Roth-type 401k contributions escape the haircut */
  var c11 = clone(blank);
  c11.profile.retirementAge = 31;
  c11.profile.annualIncome = 120000;
  c11.k401.contribPct = 10;
  c11.k401.type = 'roth';
  c11.goals.taxRatePct = 25;
  var a11 = NestEgg.analyze(c11);
  t('roth 401k contributions fully spendable',
    near(a11.spendable, a11.current.final.invested, 0.01) && near(a11.spendable, 12000, 1),
    a11.spendable + ' vs ' + a11.current.final.invested);

  /* 12. Social Security shrinks the target; retiring before it adds a bridge */
  var c12 = clone(blank);
  c12.profile.retirementAge = 65;
  c12.goals.retireSpendMonthly = 5000;
  c12.goals.ssMonthly = 2000;
  c12.goals.ssStartAge = 65;
  var a12 = NestEgg.analyze(c12);
  t('SS at retirement: target = (3000*12)/.04 = 900k', near(a12.target, 900000, 0.5), a12.target);
  c12.goals.ssStartAge = 67;
  var a12b = NestEgg.analyze(c12);
  t('SS 2y after retirement adds 48k bridge', near(a12b.target, 948000, 0.5), a12b.target);

  /* 13. Catch-up: 401k limit is 24500+8000 at age 50+ */
  var c13 = clone(blank);
  c13.profile.currentAge = 50; c13.profile.retirementAge = 51;
  c13.profile.annualIncome = 240000;
  c13.k401.contribPct = 30;
  var r13 = NestEgg.simulate(NestEgg.normalize(c13), 'current');
  t('age-50 catch-up caps year at 32500', near(r13.final.k401, 32500, 1), r13.final.k401.toFixed(2));

  /* 14. Limits are inflation-indexed: year 2 cap = base * 1.1 at 10% inflation */
  var c14 = clone(blank);
  c14.profile.retirementAge = 32;
  c14.profile.annualIncome = 600000;
  c14.k401.contribPct = 30;
  c14.goals.inflationPct = 10;
  var r14 = NestEgg.simulate(NestEgg.normalize(c14), 'current');
  t('indexed limits: 24500 + 26950 = 51450 over 2 years', near(r14.final.k401, 51450, 1), r14.final.k401.toFixed(2));

  /* 15. Contribution growth: flat monthlies grow with raises when toggled */
  var c15 = clone(blank);
  c15.profile.retirementAge = 32;
  c15.profile.incomeGrowthPct = 10;
  c15.roth.monthly = 100;
  c15.growContrib = true;
  var r15 = NestEgg.simulate(NestEgg.normalize(c15), 'current');
  t('growContrib on: 1200 + 1320 = 2520', near(r15.final.roth, 2520, 0.5), r15.final.roth.toFixed(2));
  c15.growContrib = false;
  var r15b = NestEgg.simulate(NestEgg.normalize(c15), 'current');
  t('growContrib off: flat 2400', near(r15b.final.roth, 2400, 0.5), r15b.final.roth.toFixed(2));

  /* 16. Return band brackets the central path */
  var c16 = clone(blank);
  c16.profile.retirementAge = 50;
  c16.roth.balance = 10000; c16.roth.returnPct = 7;
  var a16 = NestEgg.analyze(c16);
  t('band: low < base < high at retirement',
    a16.currentLow.final.invested < a16.current.final.invested &&
    a16.current.final.invested < a16.currentHigh.final.invested,
    [a16.currentLow.final.invested, a16.current.final.invested, a16.currentHigh.final.invested].join(' / '));

  var failed = out.filter(function (l) { return l.indexOf('FAIL') === 0; }).length;
  out.unshift((failed ? 'RESULT: FAIL (' + failed + ')' : 'RESULT: PASS') + ' — ' + out.length + ' checks');
  document.getElementById('out').textContent = out.join('\n');
})();
</script>
</body>
</html>
